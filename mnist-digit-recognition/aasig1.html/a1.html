<!DOCTYPE html>
<html>
<head>
<title>CNN MNIST Training</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>

</head>

<body>

<h2>CNN Training on MNIST</h2>
<button onclick="trainCNN()">Train Model</button>

<p id="accuracy"></p>

<script>

async function loadData(){

const mnist = new MnistData();
await mnist.load();
return mnist;

}

async function trainCNN(){

const data = await loadData();

const model = tf.sequential();

model.add(tf.layers.conv2d({
inputShape:[28,28,1],
filters:8,
kernelSize:5,
activation:'relu'
}));

model.add(tf.layers.maxPooling2d({poolSize:2}));

model.add(tf.layers.flatten());

model.add(tf.layers.dense({
units:10,
activation:'softmax'
}));

model.compile({
optimizer:'adam',
loss:'categoricalCrossentropy',
metrics:['accuracy']
});

const {xs,labels} = data.nextTrainBatch(1000);

await model.fit(xs,labels,{
epochs:5
});

const evalResult = model.evaluate(xs,labels);

const accuracy = await evalResult[1].data();

document.getElementById("accuracy").innerText =
"Accuracy after 5 epochs: "+(accuracy[0]*100).toFixed(2)+"%";

}

</script>

</body>
</html>
