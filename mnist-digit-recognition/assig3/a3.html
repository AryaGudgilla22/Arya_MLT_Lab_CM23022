<!DOCTYPE html>
<html>
<head>

<title>CNN vs Dense Comparison</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

</head>

<body>

<h2>CNN vs Dense Network</h2>

<button onclick="compareModels()">Compare</button>

<pre id="output"></pre>

<script>

async function compareModels(){

const xs = tf.randomNormal([1000,28,28,1]);
const ys = tf.oneHot(
tf.randomUniform([1000],0,10,'int32'),10
);

// CNN Model
const cnn = tf.sequential();

cnn.add(tf.layers.conv2d({
inputShape:[28,28,1],
filters:8,
kernelSize:3,
activation:'relu'
}));

cnn.add(tf.layers.flatten());

cnn.add(tf.layers.dense({units:10,activation:'softmax'}));

cnn.compile({
optimizer:'adam',
loss:'categoricalCrossentropy',
metrics:['accuracy']
});

// Dense Model
const dense = tf.sequential();

dense.add(tf.layers.flatten({
inputShape:[28,28,1]
}));

dense.add(tf.layers.dense({
units:64,
activation:'relu'
}));

dense.add(tf.layers.dense({
units:10,
activation:'softmax'
}));

dense.compile({
optimizer:'adam',
loss:'categoricalCrossentropy',
metrics:['accuracy']
});

const cnnHist = await cnn.fit(xs,ys,{epochs:3});
const denseHist = await dense.fit(xs,ys,{epochs:3});

let cnnAcc = cnnHist.history.acc.slice(-1);
let denseAcc = denseHist.history.acc.slice(-1);

document.getElementById("output").textContent =
"CNN Accuracy: "+cnnAcc+"\nDense Accuracy: "+denseAcc;

}

</script>

</body>
</html>
