<!DOCTYPE html>
<html>
<head>

<title>Digit Recognition Canvas</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

</head>

<body>

<h2>Draw Digit (0-9)</h2>

<canvas id="canvas" width="280" height="280"
style="border:2px solid black"></canvas>

<br><br>

<button onclick="predict()">Predict Digit</button>

<p id="result"></p>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

ctx.fillStyle="black";
ctx.fillRect(0,0,280,280);

let drawing=false;

canvas.onmousedown=()=>drawing=true;
canvas.onmouseup=()=>drawing=false;

canvas.onmousemove=function(e){

if(!drawing) return;

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(e.offsetX,e.offsetY,10,0,Math.PI*2);
ctx.fill();

};

async function loadModel(){

return await tf.loadLayersModel(
"https://storage.googleapis.com/tfjs-models/tfjs/mnist/model.json"
);

}

async function predict(){

const model = await loadModel();

let img = tf.browser.fromPixels(canvas,1)
.resizeNearestNeighbor([28,28])
.toFloat()
.div(255)
.expandDims(0);

let prediction = model.predict(img);

let digit = prediction.argMax(1).dataSync()[0];

document.getElementById("result").innerText =
"Predicted Digit: "+digit;

}

</script>

</body>
</html>
