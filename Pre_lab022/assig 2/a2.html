<!DOCTYPE html>
<html>
<head>
<title>Vector Operations</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
</head>

<body>

<h2>Element-wise Vector Operations</h2>
<button onclick="vectorOperation()">Run</button>

<pre id="output"></pre>

<script>

function vectorOperation(){

let out="";

const v1 = tf.tensor1d([2,4,6]);
const v2 = tf.tensor1d([1,3,5]);

// Addition
const add = tf.add(v1,v2);

// Multiplication
const multiply = tf.mul(v1,v2);

out += "Vector 1:\n" + v1.toString() + "\n\n";
out += "Vector 2:\n" + v2.toString() + "\n\n";

out += "Element-wise Addition:\n";
out += add.toString() + "\n\n";

out += "Element-wise Multiplication:\n";
out += multiply.toString();

document.getElementById("output").textContent = out;

}

</script>

</body>
</html>
